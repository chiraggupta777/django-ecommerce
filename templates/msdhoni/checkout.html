{% extends "base.html" %}

{% block content %}

<section style="margin-top: 2rem;">
  <h2>Checkout</h2>

  <div style="display: grid; gap: 1.75rem; margin-top: 1.5rem;">
    <div style="background: white; border-radius: 18px; padding: 1.5rem; box-shadow: 0 16px 24px rgba(0,0,0,0.06);">
      <h3 style="margin-bottom: 1rem;">Shipping address</h3>
      <form method="post" action="{% url 'place_order' %}">
        {% csrf_token %}
        <div style="display: grid; gap: 1rem;">
          <div>
            <label style="font-weight: 700; display: block; margin-bottom: 0.4rem;">Shipping address</label>
            <textarea name="address" rows="4" placeholder="Street address, city, postal code" style="width: 100%; padding: 0.75rem; border-radius: 12px; border: 1px solid rgba(15,23,42,0.16);" required></textarea>
          </div>
          {% if error %}
          <p style="margin: 0; color: #dc2626; font-weight: 600;">{{ error }}</p>
          {% endif %}

          <button class="button btn-primary" type="submit" style="width: 100%; padding: 0.9rem; font-size: 1rem;">Place Order</button>
        </div>
      </form>
    </div>

    <div style="background: white; border-radius: 18px; padding: 1.5rem; box-shadow: 0 16px 24px rgba(0,0,0,0.06);">
      <h3 style="margin-bottom: 1rem;">Order summary</h3>
      {% for item in items %}
      <div style="display: grid; grid-template-columns: 1fr auto; gap: 0.4rem; padding: 0.75rem 0; border-bottom: 1px solid rgba(15,23,42,0.06);">
        <div>
          <div style="font-weight: 700;">{{ item.phone.name }}</div>
          <div style="color: var(--muted); font-size: 0.9rem;">Qty: {{ item.quantity }}</div>
        </div>
        <div style="font-weight: 700;">₹{{ item.subtotal }}</div>
      </div>
      {% endfor %}

      <div style="display: flex; justify-content: space-between; margin-top: 1.25rem; font-weight: 700;">
        <span>Total</span>
        <span>₹{{ total }}</span>
      </div>
    </div>
  </div>
</section>

{% endblock %}
